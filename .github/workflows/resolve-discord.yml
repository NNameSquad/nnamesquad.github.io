name: Resolve Discord Usernames
on:
  schedule:
    - cron: '0 0 * * *' # Raz na dobę o północy
  workflow_dispatch: # Pozwala odpalić ręcznie z panelu GitHub

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Discord Usernames
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const vm = require("vm");
          const ids = new Set();

          // Bezpieczne wczytywanie zmiennych z plików JS za pomocą wbudowanego modułu VM
          function extractIdsFromJs(filePath, variableName) {
            if (!fs.existsSync(filePath)) return;
            try {
              const code = fs.readFileSync(filePath, "utf8");
              const context = {};
              vm.createContext(context);
              vm.runInContext(code, context);
              
              const data = context[variableName];
              if (Array.isArray(data)) {
                data.forEach(item => { if(item.id && item.id !== "0") ids.add(item.id); });
              }
            } catch (e) {
              console.error("Błąd odczytu zmiennej " + variableName + " z pliku " + filePath, e);
            }
          }

          // Wyciągamy ID z obu plików danych (używając prawdziwych nazw zmiennych)
          extractIdsFromJs("subpages/BoostersPage/boosters-data.js", "boosters_data");
          extractIdsFromJs("subpages/BugHuntersPage/bughunters-data.js", "bghunters_data");

          const resolved = {};

          async function fetchUsers() {
            for (const id of ids) {
              console.log(`Pobieranie użytkownika: ${id}`);
              try {
                const res = await fetch(`https://discord.com/api/v10/users/${id}`, {
                  headers: { "Authorization": `Bot ${process.env.DISCORD_TOKEN}` }
                });
                if (res.ok) {
                  const data = await res.json();
                  resolved[id] = data.global_name || data.username;
                } else {
                  resolved[id] = `ID: ${id}`;
                }
              } catch (err) {
                resolved[id] = `ID: ${id}`;
              }
              await new Promise(r => setTimeout(r, 500)); // Ochrona przed rate-limitem
            }
            
            fs.writeFileSync("subpages/BoostersPage/resolved-users.json", JSON.stringify(resolved, null, 2));
            console.log("Zapisano nazwy użytkowników!");
          }

          if(ids.size > 0) { fetchUsers(); } else { console.log("Brak ID do pobrania."); }
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add subpages/BoostersPage/resolved-users.json
          git diff-index --quiet HEAD || git commit -m "Chore: Auto-update Discord usernames [skip ci]"
          git push