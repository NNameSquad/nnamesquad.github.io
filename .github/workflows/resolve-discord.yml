name: Resolve Discord Usernames
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Discord Usernames
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          node --input-type=module -e '
          import fs from "fs";
          import vm from "vm";

          const ids = new Set();

          function extractIdsFromJs(filePath, variableName) {
            console.log(`[DEBUG] Sprawdzam plik: ${filePath}`);
            if (!fs.existsSync(filePath)) {
              console.log(`[DEBUG] Plik nie istnieje: ${filePath}`);
              return;
            }
            try {
              const code = fs.readFileSync(filePath, "utf8");
              const context = {};
              vm.createContext(context);
              vm.runInContext(code, context);
              
              const data = context[variableName];
              if (Array.isArray(data)) {
                console.log(`[DEBUG] Sukces: Znaleziono ${variableName} (${data.length} pozycji)`);
                data.forEach(item => { 
                  if(item.id && item.id !== "0") ids.add(item.id); 
                });
              } else {
                console.log(`[DEBUG] Zmienna ${variableName} nie jest tablicą.`);
              }
            } catch (e) {
              console.error(`[DEBUG] Błąd parsowania pliku ${filePath}:`, e.message);
            }
          }

          extractIdsFromJs("subpages/BoostersPage/boosters-data.js", "boosters_data");
          extractIdsFromJs("subpages/BugHuntersPage/bughunters-data.js", "bghunters_data");

          console.log(`[DEBUG] Liczba unikalnych ID do pobrania z Discorda: ${ids.size}`);

          if (ids.size === 0) {
            console.log("[DEBUG] Brak ID. Tworzę pusty plik słownika.");
            const dir = "subpages/BoostersPage";
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(`${dir}/resolved-users.json`, JSON.stringify({}, null, 2));
          } else {
            const resolved = {};
            
            // Główna pętla wykonuje się synchronicznie dla Basha dzięki top-level await
            for (const id of ids) {
              console.log(`[API] Pobieram ID: ${id}`);
              try {
                const res = await fetch(`https://discord.com/api/v10/users/${id}`, {
                  headers: { "Authorization": `Bot ${process.env.DISCORD_TOKEN}` }
                });
                console.log(`[API] Status dla ${id}: ${res.status}`);
                if (res.ok) {
                  const data = await res.json();
                  resolved[id] = data.global_name || data.username;
                  console.log(`[DEBUG] Pobrano: ${resolved[id]}`);
                } else {
                  resolved[id] = `ID: ${id}`;
                }
              } catch (err) {
                resolved[id] = `ID: ${id}`;
                console.error(`[DEBUG] Błąd sieci dla ${id}:`, err.message);
              }
              await new Promise(r => setTimeout(r, 500));
            }

            const dir = "subpages/BoostersPage";
            if (!fs.existsSync(dir)) fs.mkdirSync(dir, { recursive: true });
            fs.writeFileSync(`${dir}/resolved-users.json`, JSON.stringify(resolved, null, 2));
            console.log("[DEBUG] Plik resolved-users.json został zapisany!");
          }
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "subpages/BoostersPage/resolved-users.json" ]; then
            git add subpages/BoostersPage/resolved-users.json
            git diff-index --quiet HEAD || git commit -m "Chore: Auto-update Discord usernames [skip ci]"
            git push
          else
            echo "BŁĄD: Plik resolved-users.json nie został utworzony przez Node.js!"
            exit 1
          fi