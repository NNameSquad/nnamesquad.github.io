name: Resolve Discord Usernames
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Discord Usernames
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          node --input-type=module -e '
          import fs from "fs";

          const ids = new Set();

          function extractIdsFromFile(filePath) {
            console.log("[DEBUG] Przeszukuję plik tekstowo: " + filePath);
            if (!fs.existsSync(filePath)) {
              console.log("[DEBUG] Plik nie istnieje: " + filePath);
              return;
            }
            try {
              const content = fs.readFileSync(filePath, "utf8");
              const matches = content.match(/"\d{17,19}"|'\d{17,19}'/g);
              
              if (matches) {
                for (const match of matches) {
                  const id = match.replace(/["\']/g, "");
                  if (id !== "0") {
                    ids.add(id);
                  }
                }
              }
            } catch (e) {
              console.error("[DEBUG] Błąd odczytu pliku:", e.message);
            }
          }

          extractIdsFromFile("subpages/BoostersPage/boosters-data.js");
          extractIdsFromFile("subpages/BugHuntersPage/bughunters-data.js");

          console.log("[DEBUG] Wykryte unikalne ID użytkowników: " + ids.size);

          const resolved = {};
          
          if (ids.size > 0) {
            for (const id of ids) {
              console.log("[API] Pobieram nazwę dla ID: " + id);
              try {
                const res = await fetch("https://discord.com/api/v10/users/" + id, {
                  headers: { "Authorization": "Bot " + process.env.DISCORD_TOKEN }
                });
                if (res.ok) {
                  const data = await res.json();
                  resolved[id] = data.global_name || data.username;
                  console.log("[DEBUG] Sukces: " + id + " -> " + resolved[id]);
                } else {
                  resolved[id] = "ID: " + id;
                  console.log("[API] Discord zwrócił status " + res.status);
                }
              } catch (err) {
                resolved[id] = "ID: " + id;
                console.error("[DEBUG] Błąd sieci dla " + id + ":", err.message);
              }
              
              // Klasyczny setTimeout opakowany w Promise bez funkcji strzałkowej
              await new Promise(function(resolve) {
                setTimeout(resolve, 500);
              });
            }
          }

          const dir = "subpages/BoostersPage";
          if (!fs.existsSync(dir)) {
            fs.mkdirSync(dir, { recursive: true });
          }
          fs.writeFileSync(dir + "/resolved-users.json", JSON.stringify(resolved, null, 2));
          console.log("[DEBUG] Słownik nazw został pomyślnie zapisany.");
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "subpages/BoostersPage/resolved-users.json" ]; then
            git add subpages/BoostersPage/resolved-users.json
            git diff-index --quiet HEAD || git commit -m "Chore: Auto-update Discord usernames [skip ci]"
            git push
          else
            echo "BŁĄD: Plik resolved-users.json nie został utworzony przez Node.js!"
            exit 1
          fi