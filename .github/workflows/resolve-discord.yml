name: Resolve Discord Usernames
on:
  schedule:
    - cron: '0 0 * * *' # Raz na dobę o północy
  workflow_dispatch:

jobs:
  resolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Fetch Discord Usernames
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          const vm = require("vm");
          const ids = new Set();

          function extractIdsFromJs(filePath, variableName) {
            console.log(`[DEBUG] Próba odczytu pliku: ${filePath}`);
            if (!fs.existsSync(filePath)) {
              console.log(`[DEBUG] Plik nie istnieje: ${filePath}`);
              return;
            }
            try {
              const code = fs.readFileSync(filePath, "utf8");
              const context = {};
              vm.createContext(context);
              vm.runInContext(code, context);
              
              const data = context[variableName];
              if (Array.isArray(data)) {
                console.log(`[DEBUG] Znaleziono tablicę ${variableName}. Liczba elementów: ${data.length}`);
                data.forEach(item => { 
                  if(item.id && item.id !== "0") {
                    ids.add(item.id); 
                  }
                });
              } else {
                console.log(`[DEBUG] Zmienna ${variableName} nie jest tablicą lub nie istnieje w pliku.`);
              }
            } catch (e) {
              console.error(`[DEBUG] Błąd krytyczny podczas przetwarzania ${filePath}:`, e);
            }
          }

          extractIdsFromJs("subpages/BoostersPage/boosters-data.js", "boosters_data");
          extractIdsFromJs("subpages/BugHuntersPage/bughunters-data.js", "bghunters_data");

          console.log(`[DEBUG] Łącznie unikalnych ID do pobrania: ${ids.size}`);

          const resolved = {};

          async function fetchUsers() {
            for (const id of ids) {
              console.log(`Pobieranie użytkownika z Discord API: ${id}`);
              try {
                const res = await fetch(`https://discord.com/api/v10/users/${id}`, {
                  headers: { "Authorization": `Bot ${process.env.DISCORD_TOKEN}` }
                });
                
                console.log(`[DEBUG] Status odpowiedzi Discord dla ${id}: ${res.status}`);
                
                if (res.ok) {
                  const data = await res.json();
                  resolved[id] = data.global_name || data.username;
                  console.log(`[DEBUG] Sukces! Pobrano: ${resolved[id]}`);
                } else {
                  resolved[id] = `ID: ${id}`;
                  const errText = await res.text();
                  console.log(`[DEBUG] Discord zwrócił błąd dla ${id}: ${errText}`);
                }
              } catch (err) {
                resolved[id] = `ID: ${id}`;
                console.error(`[DEBUG] Błąd sieciowy dla ${id}:`, err);
              }
              await new Promise(r => setTimeout(r, 500));
            }
            
            const dir = "subpages/BoostersPage";
            if (!fs.existsSync(dir)){
                fs.mkdirSync(dir, { recursive: true });
            }
            
            fs.writeFileSync(`${dir}/resolved-users.json`, JSON.stringify(resolved, null, 2));
            console.log("[DEBUG] Plik resolved-users.json został pomyślnie zapisany na dysku.");
          }

          if(ids.size > 0) { 
            fetchUsers().then(() => {
              process.exit(0);
            }).catch((err) => {
              console.error("Błąd wewnątrz fetchUsers:", err);
              process.exit(1);
            });
          } else { 
            console.log("[DEBUG] Brak ID do pobrania. Przerywam tworzenie pliku."); 
            process.exit(0);
          }
          '

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "subpages/BoostersPage/resolved-users.json" ]; then
            git add subpages/BoostersPage/resolved-users.json
            git diff-index --quiet HEAD || git commit -m "Chore: Auto-update Discord usernames [skip ci]"
            git push
          else
            echo "BŁĄD: Plik resolved-users.json nie został utworzony przez Node.js!"
            exit 1
          fi